<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Abrir Gmail</title>
</head>
<body style="font-family:Arial;text-align:center;padding-top:80px;">

<h2>Abrir pesquisa no Gmail</h2>

<button onclick="abrirGmail()"
style="font-size:22px;padding:15px 25px;border:none;border-radius:10px;">

Abrir Gmail

</button>

<script>

function abrirGmail() {

    window.location.href = "googlegmail://";

    setTimeout(() => {

        window.location.href =
        "https://mail.google.com/mail/mu/mp/557/#tl/search/9021";

    }, 1000);

}

</script>

</body>
</html>
